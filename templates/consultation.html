<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Consulta</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #f4f4f5;
      padding: 20px;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;

      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ===== VIDEO ===== */

    .video-container {
      width: 100%;
      height: 500px;
      background: black;
      border-radius: 16px;
      overflow: hidden;

      display: flex;
      align-items: center;
      justify-content: center;

      color: white;
    }

    /* ===== PANELS ===== */

    .panels {
      display: flex;
      gap: 20px;
    }

    .panel {
      flex: 1;
      background: white;
      border-radius: 16px;
      padding: 16px;

      display: flex;
      flex-direction: column;
      gap: 10px;

      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    textarea {
      width: 100%;
      min-height: 120px;
      border-radius: 10px;
      padding: 10px;
      border: 1px solid #ddd;
      resize: none;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .end-consultation {
      text-align: center;
      padding: 12px;
      background: #dc2626;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      width: fit-content;
      align-self: center;
    }

    /* ===== ROLE VISIBILITY ===== */

    .patient-view { display: flex; flex-direction: column; gap: 20px;}
    .therapist-view { display: none; flex-direction: column; gap: 20px;}
    .psychiatrist-view { display: none; flex-direction: column; gap: 20px; }

  </style>
</head>

<body>

<main>

    <!-- if user.Role == Paciente -->
    <h1 style="margin: 0 auto;">Consulta com o terapeuta Gabriel Gattini</h1>
    <!-- <h1>Consulta com o paciente Ricardo Gattini</h1> -->
  <!-- VIDEO JITSI -->
  <div class="video-container">
    JITSI VIDEO HERE
  </div>

  <!-- ================= PATIENT ================= -->
  <div class="patient-view">

    <a class="end-consultation" href="#">Encerrar Consulta</a>

  </div>

  <!-- ================= THERAPIST ================= -->
  <div class="therapist-view">

    <div class="panels">

      <div class="panel">
        <h2>Anotação</h2>
        <textarea></textarea>
        <button>Salvar Anotação</button>
      </div>

      <div class="panel">
        <h2>Livro</h2>
        <textarea></textarea>
        <button>Salvar Livro</button>
      </div>

    </div>

    <a class="end-consultation" href="#">Encerrar Consulta</a>

  </div>

  <!-- ================= PSYCHIATRIST (ACTIVE) ================= -->
  <div class="psychiatrist-view">

    <div class="panels">

      <div class="panel">
        <h2>Anotação</h2>
        <textarea></textarea>
        <button>Salvar Anotação</button>
      </div>

      <div class="panel">
        <h2>Receita</h2>

        <input placeholder="Nome do remédio" />
        <input placeholder="Dosagem" />
        <input placeholder="Quantidade" />

        <button>Salvar Receita</button>
      </div>

    </div>

    <a class="end-consultation" href="#">Encerrar Consulta</a>

  </div>

</main>

</body>
</html>
