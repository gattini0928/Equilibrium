<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paciente</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #f4f4f5;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    main {
      width: 100%;
      max-width: 600px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);

      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }

    img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
    }

    span {
      color: #444;
      font-size: 0.95rem;
    }

    .label {
      font-weight: bold;
      color: #222;
    }
  </style>
</head>

<body>

<main>

  <div class="card">

    <img src="https://placehold.co/200x200" />

    <h2>Gabriel Gattini</h2>

    <span><span class="label">Email:</span> gabriel@email.com</span>
    <span><span class="label">Idade:</span> 23 anos</span>
    <span><span class="label">Diagnóstico:</span> Bipolar</span>

  </div>

</main>

</body>
</html>
