<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Consulta</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #f4f4f5;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    main {
      width: 100%;
      max-width: 700px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);

      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    h2 {
      color: #222;
    }

    .info {
      display: flex;
      flex-direction: column;
      gap: 6px;
      color: #444;
    }

    .section {
      background: #f7f7f7;
      padding: 12px;
      border-radius: 10px;

      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .section h3 {
      font-size: 0.95rem;
      color: #222;
    }

    .section p {
      font-size: 0.9rem;
      color: #555;
    }

    .label {
      font-weight: bold;
      color: #222;
    }
  </style>
</head>

<body>

<main>

  <div class="card">

    <h2>Consulta</h2>

    <div class="info">
      <span><span class="label">Paciente:</span> Gabriel Gattini</span>
      <span><span class="label">Profissional:</span> Dr. Ricardo Almeida</span>
      <span><span class="label">Data:</span> 14/05 - 09:00</span>
    </div>

    <div class="section">
      <h3>Anotação</h3>
      <p>Paciente relatou melhora no sono e redução da ansiedade.</p>
    </div>

    <div class="section">
      <h3>Livro / Receita</h3>
      <p>Livro: "O Poder do Agora"</p>
      <p>Ou: Fluoxetina 20mg - 1x ao dia</p>
    </div>

  </div>

</main>

</body>
</html>
