<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Perfil do Paciente</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #f4f4f5;
      padding: 20px;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;

      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    h2 {
      color: #222;
    }

    /* ===== GRID ===== */

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 16px;

      display: flex;
      flex-direction: column;
      gap: 12px;

      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    /* ===== PROFILE CARD ===== */

    .profile-card img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
    }

    .profile-card span {
      color: #444;
      font-size: 0.9rem;
    }

    /* ===== CONSULTATIONS ===== */

    .consultation {
      background: #f7f7f7;
      padding: 10px;
      border-radius: 10px;

      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .consultation a {
      font-size: 0.8rem;
      color: #2563eb;
      text-decoration: none;
      width: fit-content;
    }

    /* ===== THERAPIST / PSYCHIATRIST ===== */

    .professional-card img {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
    }

    .professional-card a {
      font-size: 0.85rem;
      color: white;
      background: #2563eb;
      text-decoration: none;

      padding: 8px 10px;
      border-radius: 10px;

      width: fit-content;
    }

    .professional-card h3 {
      font-size: 1rem;
      color: #222;
    }

    /* RESPONSIVO */

    @media (max-width: 1000px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

  </style>
</head>

<body>

<main>

  <h2>Seu Perfil - Gabriel Gattini</h2>

  <section class="grid">

    <!-- ================= COLUNA 1 - PROFILE ================= -->
    <div class="card profile-card">

      <img src="https://placehold.co/200x200" />

      <span>Gabriel Gattini</span>
      <span>gabriel@email.com</span>
      <span>23 anos</span>
      <span>Diagnóstico: Bipolar</span>

    </div>

    <!-- ================= COLUNA 2 - CONSULTAS ================= -->
    <div class="card">

      <h2>Consultas</h2>

      <div class="consultation">
        <span>Dr. Ricardo Almeida</span>
        <span>14/05 - 09:00</span>
        <a href="#">Ver Detalhes</a>
      </div>

      <div class="consultation">
        <span>Dra. Ana Souza</span>
        <span>16/05 - 14:30</span>
        <a href="#">Ver Detalhes</a>
      </div>

    </div>

    <!-- ================= COLUNA 3 - PROFISSIONAIS ================= -->
    <div class="card">

      <!-- TERAPEUTA -->
      <div class="card professional-card">

        <h3>Terapeuta - Dr. Ricardo</h3>

        <img src="https://placehold.co/120x120" />

        <a href="#">Ver Agenda</a>

      </div>

      <!-- PSIQUIATRA -->
      <div class="card professional-card">

        <h3>Psiquiatra - Dra. Ana</h3>

        <img src="https://placehold.co/120x120" />

        <a href="#">Ver Agenda</a>

      </div>

    </div>

  </section>

</main>

</body>
</html>
